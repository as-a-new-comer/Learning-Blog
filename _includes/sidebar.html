<aside class="sidebar">
  <div class="card sidebar-card">
    <img class="profile-avatar"
         src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'%3E%3Crect width='80' height='80' fill='%232d3748'/%3E%3Ctext x='40' y='50' text-anchor='middle' fill='%23fff' font-size='36'%3E🐉%3C/text%3E%3C/svg%3E"
         alt="avatar">
    <div class="profile-name">{{ site.title }}</div>
    <div class="profile-bio">{{ site.description }}</div>
  </div>

  <div class="card sidebar-card">
    <div class="sidebar-title">Recent Posts</div>
    <ul style="list-style:none;font-size:0.9rem;line-height:2;">
      {%- for post in site.posts limit:5 -%}
        <li><a href="{{ post.url | relative_url }}">{{ post.title }}</a></li>
      {%- endfor -%}
    </ul>
  </div>
</aside>
