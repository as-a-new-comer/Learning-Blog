<div class="pdf-container" style="width:100%; height:800px; border:1px solid #ddd; margin:1em 0;">
  <iframe
    src="{{ include.src | relative_url }}"
    width="100%"
    height="100%"
    style="border:none;"
    loading="lazy">
  </iframe>
</div>
<p class="pdf-fallback">
  <small><a href="{{ include.src | relative_url }}" target="_blank">直接打开 PDF</a></small>
</p>
