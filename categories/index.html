---
layout: default
title: Categories
permalink: /categories/
---
{%- for cat in site.categories -%}
<div class="card" id="{{ cat[0] | slugify }}">
  <h3 style="margin-bottom:12px;">{{ cat[0] }} <span style="color:var(--color-text-light);font-size:0.85rem;">({{ cat[1].size }})</span></h3>
  <ul style="list-style:none;line-height:2.2;">
    {%- for post in cat[1] -%}
    <li><a href="{{ post.url | relative_url }}">{{ post.title }}</a> <span style="color:var(--color-text-light);font-size:0.85rem;">{{ post.date | date: "%Y-%m-%d" }}</span></li>
    {%- endfor -%}
  </ul>
</div>
{%- endfor -%}
