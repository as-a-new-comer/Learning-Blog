---
layout: default
---
<article class="card">
  <header class="article-header">
    <h1 class="article-title">{{ page.title | escape }}</h1>
    <div class="post-meta">
      <span>{{ page.date | date: "%Y-%m-%d" }}</span>
      {%- if page.categories.size > 0 -%}
      <span>· {{ page.categories | join: ", " }}</span>
      {%- endif -%}
    </div>
  </header>
  <div class="article-content">
    {{ content }}
  </div>
</article>
